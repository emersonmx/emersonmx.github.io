<div class="info">
    <span class="item">
        <i class="fa fa-calendar" aria-hidden="true"></i>
        <time datetime="include.post.date | date_to_xmlschema" itemprop="datePublished">
            {% include date-for-humans.html date=include.post.date %}
        </time>
    </span>
    <span class="item">
        <i class="fa fa-folder-open-o" aria-hidden="true"></i>
        <a href="{% link _pages/categories.html %}#{{ include.post.category }}">
            {{ site.data.categories[include.post.category] }}
        </a>
    </span>
    <span class="item">
        <i class="fa fa-tags" aria-hidden="true"></i>
        {% for tag in include.post.tags %}
        <a href="{% link _pages/tags.html %}#{{ tag }}">
            {{ site.data.tags[tag] }}</a>{% unless forloop.last %}, {% endunless %}
        {% endfor %}
    </span>
</div>
