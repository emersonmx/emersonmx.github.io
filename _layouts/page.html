---
layout: default
---
<div class="page container-fluid">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <article itemscope itemtype="http://schema.org/BlogPosting">
                <header>
                    <h1 itemprop="name headline">{{ page.title | escape }}</h1>
                </header>

                <div itemprop="articleBody">
                    {{ content }}
                </div>
            </article>
        </div>
    </div>
</div>
